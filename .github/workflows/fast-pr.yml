name: Fast pull request checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fast-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test renderer and Electron boundaries
        run: npm test

      - name: Build production renderer
        run: npm run build
